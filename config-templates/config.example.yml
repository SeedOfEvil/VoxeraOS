mode: mixed
brain:
  primary:
    type: gemini
    model: gemini-3-flash
    api_key_ref: CLOUD_API_KEY
  fallback:
    type: openai_compat
    base_url: http://localhost:11434/v1
    model: llama3
policy:
  network_changes: ask
  installs: ask
  file_delete: ask
  open_apps: allow
  system_settings: ask
privacy:
  cloud_allowed: true
  redact_logs: true

web_investigation:
  provider: brave
  api_key_ref: BRAVE_API_KEY
  env_api_key_var: BRAVE_API_KEY
  max_results: 5

sandbox_image: docker.io/library/ubuntu:24.04
sandbox_memory: 512m
sandbox_cpus: 1.0
sandbox_pids_limit: 256
