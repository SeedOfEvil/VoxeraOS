name: merge-readiness

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "Makefile"
      - "README.md"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - ".github/workflows/merge-readiness.yml"
      - ".pre-commit-config.yaml"
      - "mypy.ini"
  workflow_dispatch: {}

jobs:
  merge-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run merge readiness checks
        run: make merge-readiness-check
