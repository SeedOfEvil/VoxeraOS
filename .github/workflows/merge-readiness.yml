name: merge-readiness

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "Makefile"
      - "README.md"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "tools/**"
      - ".github/workflows/merge-readiness.yml"
      - ".pre-commit-config.yaml"
      - "mypy.ini"
  workflow_dispatch: {}

jobs:
  merge-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run merge readiness checks
        run: |
          mkdir -p artifacts
          set +e
          make quality-check > artifacts/quality-check.txt 2>&1
          quality_rc=$?
          make release-check > artifacts/release-check.txt 2>&1
          release_rc=$?
          set -e
          cat artifacts/quality-check.txt
          cat artifacts/release-check.txt

          {
            echo "## merge-readiness summary"
            if [ $quality_rc -eq 0 ] && [ $release_rc -eq 0 ]; then
              echo "- ✅ quality-check: passed"
              echo "- ✅ release-check: passed"
            else
              if [ $quality_rc -ne 0 ]; then
                echo "- ❌ quality-check: failed (see artifacts/quality-check.txt)"
              else
                echo "- ✅ quality-check: passed"
              fi

              if [ $release_rc -ne 0 ]; then
                echo "- ❌ release-check: failed (see artifacts/release-check.txt)"
              else
                echo "- ✅ release-check: passed"
              fi

              echo "- Reproduce locally from repository root: `make merge-readiness-check`"
              echo "- Failure logs are uploaded as the `merge-readiness-logs` artifact."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ $quality_rc -ne 0 ] || [ $release_rc -ne 0 ]; then
            exit 1
          fi

      - name: Upload merge-readiness artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: merge-readiness-logs
          path: artifacts/
