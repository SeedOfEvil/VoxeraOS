name: merge-readiness

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "Makefile"
      - "README.md"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "tools/**"
      - ".github/workflows/merge-readiness.yml"
      - ".pre-commit-config.yaml"
      - "mypy.ini"
  workflow_dispatch: {}

jobs:
  merge-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run merge readiness checks
        run: |
          mkdir -p artifacts
          make quality-check > artifacts/quality-check.txt 2>&1
          make release-check > artifacts/release-check.txt 2>&1
          cat artifacts/quality-check.txt
          cat artifacts/release-check.txt

      - name: Upload merge-readiness artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: merge-readiness-logs
          path: artifacts/
