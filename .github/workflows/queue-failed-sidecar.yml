name: queue-failed-sidecar-guardrail

on:
  pull_request:
    paths:
      - "src/voxera/core/queue_daemon.py"
      - "tests/test_queue_daemon.py"
      - "README.md"
      - "docs/ops.md"
      - "Makefile"

jobs:
  failed-sidecar-guardrail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run failed-sidecar schema/lifecycle guardrail tests
        run: make test-failed-sidecar
