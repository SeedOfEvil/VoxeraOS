name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  stage-a-pr-gates:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Resolve changed Python files
        id: changed
        shell: bash
        run: |
          base_ref="${{ github.base_ref }}"
          git fetch origin "$base_ref" --depth=1
          files=$(git diff --name-only --diff-filter=AM origin/"$base_ref"...HEAD -- '*.py' || true)
          {
            echo 'files<<EOF'
            echo "$files"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Ruff (changed files only)
        shell: bash
        run: |
          if [ -n "${{ steps.changed.outputs.files }}" ]; then
            echo "${{ steps.changed.outputs.files }}" | xargs -r ruff check
          else
            echo "No changed Python files; skipping changed-file ruff gate."
          fi

      - name: Mypy (changed files only)
        shell: bash
        run: |
          if [ -n "${{ steps.changed.outputs.files }}" ]; then
            echo "${{ steps.changed.outputs.files }}" | xargs -r mypy
          else
            echo "No changed Python files; skipping changed-file mypy gate."
          fi

      - name: Pytest (full)
        run: pytest

  stage-b-strict-gates:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Ruff (full repository)
        run: ruff check .

      - name: Mypy (full repository)
        run: mypy src

      - name: Pytest (full)
        run: pytest
