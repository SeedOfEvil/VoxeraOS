name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stage-a-pr-gates:
    name: Stage A (PR) - changed files + full tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Determine changed Python files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          mapfile -t changed_py < <(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" -- '*.py')

          printf '%s\n' "${changed_py[@]:-}" > changed_python_files.txt
          if [ -s changed_python_files.txt ]; then
            CHANGED_PY=$(paste -sd ' ' changed_python_files.txt)
          else
            CHANGED_PY=""
          fi

          {
            echo "changed_py=$CHANGED_PY"
            echo "changed_count=${#changed_py[@]}"
          } >> "$GITHUB_OUTPUT"

          echo "Changed Python files (${#changed_py[@]}):"
          cat changed_python_files.txt || true

      - name: Ruff check (changed files only, blocking)
        if: steps.changed.outputs.changed_py != ''
        run: ruff check ${{ steps.changed.outputs.changed_py }}

      - name: Ruff format check (changed files only, blocking)
        if: steps.changed.outputs.changed_py != ''
        run: ruff format --check ${{ steps.changed.outputs.changed_py }}

      - name: Skip changed-file lint when no Python files changed
        if: steps.changed.outputs.changed_py == ''
        run: echo "No changed Python files; skipping changed-file ruff checks."

      - name: Mypy (changed files only, non-blocking)
        id: mypy_stage_a
        if: steps.changed.outputs.changed_py != ''
        continue-on-error: true
        run: mypy ${{ steps.changed.outputs.changed_py }} | tee mypy-stage-a.txt

      - name: Mypy skip note (no changed Python files)
        if: steps.changed.outputs.changed_py == ''
        run: echo "No changed Python files; skipping changed-file mypy." | tee mypy-stage-a.txt

      - name: Upload Stage A mypy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-stage-a-report
          path: mypy-stage-a.txt

      - name: Pytest (full suite, blocking)
        run: pytest -q

  stage-b-main-gates:
    name: Stage B (main push/manual) - full repository
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Ruff check (full repo, blocking)
        run: ruff check .

      - name: Ruff format check (full repo, blocking)
        run: ruff format --check .

      - name: Mypy (src, non-blocking)
        continue-on-error: true
        run: mypy src | tee mypy-stage-b.txt

      - name: Upload Stage B mypy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-stage-b-report
          path: mypy-stage-b.txt

      - name: Pytest (full suite, blocking)
        run: pytest -q
