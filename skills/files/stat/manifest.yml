id: files.stat
name: Stat Path
description: Read basic metadata for a path within allowlisted notes paths.
entrypoint: voxera_builtin_skills.files_stat:run
capabilities: ["files.read"]
risk: low
exec_mode: local
needs_network: false
fs_scope: read_only
output_schema: skill_result.v1
output_artifacts: []
args:
  path:
    type: string
    required: true
    description: Existing file or directory path under ~/VoxeraOS/notes.
